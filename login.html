<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGU-PMS - Đăng nhập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('assets/images/AG.jpg') no-repeat center center/cover;
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .login-container { 
            width: 100%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 15px; 
            
            background: rgba(255, 255, 255, 0.15); /* trong suốt */
            backdrop-filter: blur(10px); /* hiệu ứng kính mờ */
            -webkit-backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
        }

        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 5px; 
            font-size: 14px; 
            
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #000;
        }

        .form-group input::placeholder {
            color: #000;
        }
        
        /*
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #005595 0%, #0088cc 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .login-container { 
            width: 100%; 
            max-width: 400px; 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
        }
        */
        .logo-section { 
            text-align: center; 
            margin-bottom: 30px; 
        }
        
        .logo-section i { 
            font-size: 50px; 
            color: #005595; 
            margin-bottom: 10px; 
        }
        
        .logo-section h1 { 
            font-size: 24px; 
            color: #000; 
            margin: 10px 0; 
        }
        
        .logo-section p { 
            color: #000; 
            font-size: 14px; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
        }
        
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #000; 
            font-weight: 500; 
            font-size: 14px;
        }
        /*
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 14px; 
            transition: border-color 0.3s; 
        }
        */
        .form-group input:focus { 
            outline: none; 
            border-color: #005595; 
            box-shadow: 0 0 5px rgba(0,85,149,0.3); 
        }
        
        .btn-login { 
            width: 100%; 
            padding: 16px; 
            background: rgba(0, 85, 149, 0.8);
            backdrop-filter: blur(5px);
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
        }

        .btn-login:hover { 
            background: rgba(0, 64, 128, 0.9); 
            transform: scale(1.03);
        }
        
        .btn-login:disabled { 
            background: #ccc; 
            cursor: not-allowed; 
        }
        
        .form-footer { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            color: #000; 
        }
        
        .form-footer a { 
            color: #005595; 
            text-decoration: none; 
            cursor: pointer; 
        }
        
        .form-footer a:hover { 
            text-decoration: underline; 
        }
        
        .error-message { 
            background: #f8d7da; 
            color: #721c24; 
            padding: 12px; 
            border-radius: 5px; 
            margin-bottom: 20px; 
            display: none; 
            border: 1px solid #f5c6cb;
        }
        
        .success-message { 
            background: #d4edda; 
            color: #155724; 
            padding: 12px; 
            border-radius: 5px; 
            margin-bottom: 20px; 
            display: none; 
            border: 1px solid #c3e6cb;
        }
        
        .register-form { 
            display: none; 
        }
        
        .register-form.show { 
            display: block; 
        }
        
        .login-form.hide { 
            display: none; 
        }
        
        .loading { 
            display: none; 
            text-align: center; 
            color: #005595; 
        }
        
        .spinner { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #005595; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 10px; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* Section title inside forms */
        .form-section-title {
            font-size: 24px;
            font-weight: 700;
            color: #000;
            margin-bottom: 14px;
        }

        #btnSendOTP {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #005595, #007bff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 85, 149, 0.3);
        }

        /* Hover */
        #btnSendOTP:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 85, 149, 0.4);
        }

        /* Click */
        #btnSendOTP:active {
            transform: scale(0.97);
        }

        /* Disabled */
        #btnSendOTP:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="assets/images/AGU.png" alt="Logo AGU" style="height:80px; width:80px; object-fit:cover; border-radius:50%; display:inline-block; margin-right:10px;">
            <h1>AGU-PMS</h1>
            <p>HỆ THỐNG QUẢN LÝ NHIỆM VỤ GIẢNG VIÊN</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <!-- LOGIN FORM -->
        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-section-title">Đăng nhập</div>
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
            </div>
            <div class="loading" id="loginLoading">
                <div class="spinner"></div>
                <p>Đang đăng nhập...</p>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Đăng nhập</button>
        </form>

        <!-- REGISTER FORM -->
        <form class="register-form" id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-section-title">Đăng ký</div>
            <div class="form-group">
                <label for="regUsername">Tên đăng nhập</label>
                <input type="text" id="regUsername" name="username" required placeholder="Tạo tên đăng nhập">
            </div>
            <div class="form-group" style="position: relative;">
                <label>Mật khẩu</label>
                <input type="password" id="regPassword" required placeholder="Nhập mật khẩu">

                <i class="fas fa-eye-slash toggle-password"
                data-target="regPassword"
                style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
            </div>

            <div class="form-group" style="position: relative;">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="regConfirmPassword" required placeholder="Nhập lại mật khẩu">

                <i class="fas fa-eye-slash toggle-password"
                data-target="regConfirmPassword"
                style="position:absolute; right:10px; top:38px; cursor:pointer;"></i>
            </div>

            <div class="form-group">
                <label for="regFullName">Họ và tên</label>
                <input type="text" id="regFullName" name="fullName" required placeholder="Nhập họ và tên">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required>
            </div>
            
            <div class="form-group">
                <button type="button" id="btnSendOTP" onclick="sendOTP()">Gửi OTP</button>
            </div>

            <div class="form-group">
                <label>Nhập OTP</label>
                <input type="text" id="otp" placeholder="Nhập mã OTP">
            </div>

            <div class="form-group">
                <button type="button" id="btnSendOTP" onclick="verifyOTP()">Xác minh OTP</button>
            </div>

            <div class="form-group">
                <label for="regMaGV">Mã giảng viên</label>
                <input type="text" id="regMaGV" name="maGV" required placeholder="Nhập mã giảng viên">
            </div>
            <div class="loading" id="registerLoading">
                <div class="spinner"></div>
                <p>Đang đăng ký...</p>
            </div>
            <button type="submit" class="btn-login" id="registerBtn">Đăng ký</button>
        </form>

        <div class="form-footer">
            <span id="footerText">Chưa có tài khoản? <a onclick="switchTab('register')">Đăng ký tại đây</a></span>
        </div>
    </div>

    <script src="db-api.js"></script>
    <script>
        // Chuyển đổi giữa form Login và Register
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const footerText = document.getElementById('footerText');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                footerText.innerHTML = 'Chưa có tài khoản? <a onclick="switchTab(\'register\')">Đăng ký tại đây</a>';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                footerText.innerHTML = 'Đã có tài khoản? <a onclick="switchTab(\'login\');">Đăng nhập</a>';
            }

            // Clear messages
            hideMessages();
        }

        // Xử lý Đăng nhập
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginLoading = document.getElementById('loginLoading');

            loginBtn.disabled = true;
            loginLoading.style.display = 'block';

            try {
                // ADMIN CỨNG
                if (username === 'admin' && password === 'admin12345') {
                    showSuccess('Đăng nhập admin thành công!');

                    localStorage.setItem('user', JSON.stringify({
                        username: 'admin',
                        role: 'admin'
                    }));

                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);

                    return;
                }

                // USER CỨNG (vào index)
                if (username === 'Admin' && password === '123456') {
                    showSuccess('Đăng nhập thành công!');

                    localStorage.setItem('user', JSON.stringify({
                        username: 'Admin',
                        role: 'user'
                    }));

                    setTimeout(() => {
                        window.location.href = 'Index.html';
                    }, 1000);

                    return;
                }

                // LOGIN API
                const result = await DatabaseAPI.dangNhap(username, password);

                if (result.success) {
                    showSuccess('Đăng nhập thành công!');
                    document.getElementById('loginForm').reset();

                    const userData = {
                        id: result.user.ID,
                        username: username,
                        hoTen: result.user.HO_TEN,
                        role: result.user.role || 'user'
                    };
                    
                    if (!user.avatar) {
                        user.avatar = 'assets/images/user.jpg';
                    }

                    localStorage.setItem('user', JSON.stringify(userData));

                    setTimeout(() => {
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'Index.html';
                        }
                    }, 1000);

                } else {
                    showError(result.message || 'Sai tài khoản hoặc mật khẩu');
                }

            } catch (error) {
                console.error(error);
                showError('Lỗi kết nối server');
            } finally {
                loginBtn.disabled = false;
                loginLoading.style.display = 'none';
            }
        }

        // Xử lý Đăng ký
        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const fullName = document.getElementById('regFullName').value;
            const email = document.getElementById('regEmail').value;
            const maGV = document.getElementById('regMaGV').value;
            const registerBtn = document.getElementById('registerBtn');
            const registerLoading = document.getElementById('registerLoading');

            if (password !== confirmPassword) {
                showError('Mật khẩu không khớp');
                return;
            }

            if (password.length < 6) {
                showError('Mật khẩu tối thiểu 6 ký tự');
                return;
            }

            if (!isVerified) {
                showError('Vui lòng xác thực OTP trước');
                return;
            }

            registerBtn.disabled = true;
            registerLoading.style.display = 'block';

            try {
                const result = await DatabaseAPI.dangKy({
                    username,
                    password,
                    hoTen: fullName,
                    email,
                    maGV
                });

                if (result.success) {
                    showSuccess('Đăng ký thành công!');
                    document.getElementById('registerForm').reset();
                    isVerified = false;
                    document.getElementById('registerBtn').disabled = true;

                    setTimeout(() => {
                        switchTab('login');
                    }, 1500);
                } else {
                    showError(result.message || 'Đăng ký thất bại. Vui lòng thử lại.');
                }
            } catch (error) {
                showError('Lỗi kết nối. Vui lòng thử lại sau.');
            } finally {
                registerBtn.disabled = false;
                registerLoading.style.display = 'none';
            }
        }

        // Hiển thị thông báo lỗi
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Hiển thị thông báo thành công
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // Ẩn tất cả thông báo
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        // Kiểm tra nếu đã đăng nhập
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('user'));

            if (user) {
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'Index.html';
                }
            }
        });
        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });

        let isVerified = false;

        async function verifyOTP() {
            const email = document.getElementById('regEmail').value;
            const otp = document.getElementById('otp').value;

            if (!otp) {
                showError('Vui lòng nhập OTP');
                return;
            }

            if (!otp || otp.length !== 6) {
                showError('OTP phải gồm 6 số');
                return;
            }

            const res = await fetch('http://localhost:3000/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
            });

            const data = await res.json();

            if (data.success) {
                showSuccess('Xác thực thành công');
                isVerified = true;

                // mở khóa nút đăng ký
                const btn = document.getElementById('registerBtn');
                btn.disabled = false;
                btn.innerText = "Đã xác thực";
            } else {
                isVerified = false;
                showError('OTP sai hoặc hết hạn');
            }
        }

        let countdown = 60;
        async function sendOTP() {
            const email = document.getElementById('regEmail').value;
            const btn = document.getElementById('btnSendOTP');

            if (!email.endsWith('@agu.edu.vn')) {
                showError('Email phải là @agu.edu.vn');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';

            try {
                // gọi API gửi OTP
                await fetch('/api/send-otp');

                btn.innerHTML = '<i class="fas fa-check"></i> Đã gửi';
            } catch (err) {
                btn.innerHTML = '<i class="fas fa-times"></i> Lỗi';
            }

            const res = await fetch('http://localhost:3000/api/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            document.querySelector('button[onclick="verifyOTP()"]').disabled = true;

            if (data.success) {
                showSuccess('OTP đã gửi về email');

                document.querySelector('button[onclick="verifyOTP()"]').disabled = false;

                let time = 60;
                btn.innerText = `Gửi lại (${time}s)`;

                const interval = setInterval(() => {
                    time--;
                    btn.innerText = `Gửi lại (${time}s)`;

                    if (time <= 0) {
                        clearInterval(interval);
                        btn.disabled = false;
                        btn.innerText = 'Gửi OTP';
                    }
                }, 1000);

            } else {
                showError(data.message);
                btn.disabled = false;
            }
        }

        document.getElementById('regEmail').addEventListener('blur', function () {
            const email = this.value;
            const regex = /^[a-zA-Z0-9._%+-]+@agu\.edu\.vn$/;

            if (!regex.test(email)) {
                showError('Email phải đúng định dạng @agu.edu.vn');
            }
        });

        document.getElementById('registerBtn').disabled = true;

        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('regPassword');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;

            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });
        document.getElementById('regEmail').addEventListener('input', () => {
            isVerified = false;
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('otp').value = "";
            document.querySelector('button[onclick="verifyOTP()"]').disabled = true;
        });
    </script>
</body>
</html>
